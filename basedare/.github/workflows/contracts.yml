name: Contracts CI

on:
  push:
    branches: [main, develop]
    paths:
      - "contracts/**"
      - "test/**"
      - "hardhat.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/contracts.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "contracts/**"
      - "test/**"
      - "hardhat.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/contracts.yml"
  workflow_dispatch:

concurrency:
  group: contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hardhat-contracts:
    name: Hardhat Compile, Test, Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run contracts:compile

      - name: Run contract tests
        run: npm run contracts:test

      - name: Generate coverage report
        run: npm run contracts:coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-coverage
          path: |
            coverage/
            coverage.json
          retention-days: 7
